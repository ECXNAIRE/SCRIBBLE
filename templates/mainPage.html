<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIBBLE</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-user-drag: none;
            font-family: sans-serif;
        }


        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            box-shadow:
                0 2px 8px rgba(15, 23, 42, .04);
        }

        body {
            margin: 0;
            background: #F5F9FC;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #toolBarTop {
            width: 60%;
            height: 45px;
            background: #FFFFFF;
            border: 0.5px solid #D9E6F2;
            margin-top: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
            flex-shrink: 0;
        }

        #mainArea {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        #toolBarLeft {
            width: 250px;
            background: #FFFFFF;
            border: 1px solid #D9E6F2;
            border-radius: 12px;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            padding-top: 30px;
        }

        #canvasArea {
            flex: 1;
            height: 100%;
            border: 0.5px solid #D9E6F2;
            border-radius: 10px;
            background: white;
        }

        #toolBarTop button {
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #toolBarTop button:hover {
            background: #cfe4ff;
        }

        #toolBarTop button.active {
            background: #bedaff;
        }

        #strokeArea {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .strokeBtn {
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background: #F3F4F6;
            border: none;
            cursor: pointer;
            transition: .15s;
            margin-bottom: 25px;
        }

        #toolBarLeft button:hover {
            background: #cfe4ff;
        }

        #toolBarLeft button.active {
            background: #bedaff;
        }

        .title {
            font-size: 13px;
            color: #000000;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .styleGroup {
            width: 90%;
            display: flex;
            flex-direction: row;
            gap: 3px;
            align-items: center;
            margin-bottom: 25px;
        }

        .styleGroup input[type="color"] {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: white;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 10px;
            border: 0.5px solid black
        }

        .strokeColorBtn,
        .fillColorBtn {
            width: 28px;
            height: 28px;
            padding: 1.5px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .strokeColorBtn:hover,
        .fillColorBtn:hover {
            cursor: pointer;
            transform: scale(1.08);
        }

        .strokeColorBtn.active,
        .fillColorBtn.active {
            border: 0.5px solid #2563EB;
        }

        .divider {
            width: 1.5px;
            height: 29px;
            background: #000000;
        }

        .strokeColorBtn div,
        .fillColorBtn div {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        canvas {
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="toolBarTop">
        <div class="toolGroup">
            <button class="active" data-tool="pointer">
                <img src="../static/assets/mouse-pointer-2.svg">
            </button>
            <button data-tool="hand">
                <img src="../static/assets/hand.svg">
            </button>
        </div>


        <div class="toolGroup">
            <button data-tool="pencil">
                <img src="../static/assets/pencil.svg">
            </button>
            <button data-tool="line">
                <img src="../static/assets/minus.svg">
            </button>
            <button data-tool="arrow">
                <img src="../static/assets/move-right.svg">
            </button>
            <button data-tool="rectangle">
                <img src="../static/assets/rectangle-horizontal.svg">
            </button>
            <button data-tool="triangle">
                <img src="../static/assets/triangle.svg">
            </button>
            <button data-tool="diamond">
                <img src="../static/assets/diamond.svg">
            </button>
            <button data-tool="circle">
                <img src="../static/assets/circle.svg">
            </button>
        </div>

        <div class="toolGroup">
            <button data-tool="text">
                <img src="../static/assets/type.svg">
            </button>
            <button data-tool="image">
                <img src="../static/assets/image.svg">
            </button>
        </div>


        <div>
            <button data-tool="undo">
                <img src="../static/assets/undo.svg">
            </button>
            <button data-tool="redo">
                <img src="../static/assets/redo.svg">
            </button>
        </div>

        <div class="toolGroup">
            <button data-tool="download">
                <img src="../static/assets/arrow-down-to-line.svg">
            </button>
            <button data-tool="settings">
                <img src="../static/assets/settings.svg">
            </button>
        </div>


    </div>
    <div id="mainArea">
        <div id="toolBarLeft">

            <div class="title">Stroke</div>
            <div class="styleGroup">
                <input type="color" id="strokeColorPicker" value="#000000">
                <div class="divider"></div>
                <button class="strokeColorBtn" data-color="#2563EB">
                    <div style="background:#2563EB;"></div>
                </button>
                <button class="strokeColorBtn" data-color="#DC2626">
                    <div style="background:#DC2626;"></div>
                </button>
                <button class="strokeColorBtn" data-color="#16A34A">
                    <div style="background:#16A34A;"></div>
                </button>
                <button class="strokeColorBtn" data-color="#7C3AED">
                    <div style="background:#7C3AED;"></div>
                </button>
                <button class="strokeColorBtn" data-color="#000000">
                    <div style="background:#000000;"></div>
                </button>
            </div>


            <div class="title">Fill</div>
            <div class="styleGroup">
                <input type="color" id="fillColorPicker" value="#ffffff">
                <div class="divider"></div>
                <button class="fillColorBtn" data-color="#FF6B6B">
                    <div style="background:#FF6B6B;"></div>
                </button>
                <button class="fillColorBtn" data-color="#81C784">
                    <div style="background:#81C784;"></div>
                </button>
                <button class="fillColorBtn" data-color="#F48FB1">
                    <div style="background:#F48FB1;"></div>
                </button>
                <button class="fillColorBtn" data-color="#A1887F">
                    <div style="background:#A1887F;"></div>
                </button>
                <button class="fillColorBtn" data-color="#FACC15">
                    <div style="background:#FDE68A;"></div>
                </button>
            </div>

            <div class="title">Sloppiness</div>
            <div id="strokeArea">
                <button class="strokeBtn active" data-stroke="stroke1">
                    <img src="../static/assets/minus.svg">
                </button>
                <button class="strokeBtn" data-stroke="stroke2">
                    <img src="../static/assets/minus.svg">
                </button>
                <button class="strokeBtn" data-stroke="stroke3">
                    <img src="../static/assets/minus.svg">
                </button>
            </div>


        </div>
        <div id="canvasArea">
            <canvas id="canvas">

            </canvas>
        </div>
    </div>


    <script type="module" src="../static/js/main.js"></script>

</body>

</html>

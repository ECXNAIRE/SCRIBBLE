<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIBBLE</title>
    <style>
        @font-face {
            font-family: "codingFont";
            src: url("../static/fonts/codingFont.ttf") format("truetype");
        }

        @font-face {
            font-family: "handWriting";
            src: url("../static/fonts/GloriaHallelujah-Regular.ttf") format("truetype");
            font-size: 100px;
        }

        @font-face {
            font-family: "handWriting2";
            src: url("../static/fonts/Excalifont-Regular.woff2") format("woff2");
            font-size: 100px;
        }



        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-user-drag: none;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }


        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #toolBarTop,
        #toolBarLeft,
        #bottomPanel,
        #canvasArea {
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
            border: 2px solid #D1D5DB;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #F5F9FC;
        }

        #toolBarTop {
            width: 60%;
            height: 40px;
            background: #FFFFFF;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
            flex-shrink: 0;
            position: absolute;
            top: 30px;
            right: 250px;
            border-radius: 12px;
        }

        .toolBarTopBtn img,
        #gridToggleBtn img {
            width: 20px;
            height: 20px
        }

        #toolBarLeft {
            width: 240px;
            max-height: calc(100vh - 180px);
            background: #FFFFFF;
            border-radius: 12px;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            padding-top: 30px;
            padding-left: 10px;
            overflow-y: auto;
            overflow-x: hidden;
            position: absolute;
            top: 90px;
            left: 20px;
            display: none;
        }

        #canvasArea {
            position: fixed;
            inset: 0;
            background: white;
            width: 100vw;
            height: 100vh
        }

        #toolBarTop button {
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            border: 1.5px solid rgba(0, 0, 0, 0)
        }

        #toolBarTop button:hover {
            background: #cfe4ff;
        }

        #toolBarTop button.active {
            background: #bedaff;
            border: 1.5px solid #3B82F6;
        }

        #strokeArea,
        #strokeWidthArea,
        #fillTypeArea,
        #edgeStyleArea,
        #layerToggleArea,
        #fontStyleArea,
        #pressureSelectionArea {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .strokeBtn,
        .strokeWidthBtn,
        .fillTypeBtn,
        .edgeStyleBtn,
        .layerToggleBtn,
        .fontStyleBtn,
        .pressureBtn {
            width: 40px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background: #F3F4F6;
            border: none;
            cursor: pointer;
            transition: .15s;
            margin-bottom: 0px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            overflow: hidden;
        }

        .strokeBtn:hover,
        .strokeWidthBtn:hover,
        .fillTypeBtn:hover,
        .edgeStyleBtn:hover,
        .layerToggleBtn:hover,
        .fontStyleBtn:hover,
        .pressureBtn:hover {
            background: #cfe4ff;
        }

        .strokeBtn.active,
        .strokeWidthBtn.active,
        .fillTypeBtn.active,
        .edgeStyleBtn.active,
        .fontStyleBtn.active,
        .pressureBtn.active {
            background: #bedaff;
            border: 1.5px solid #3B82F6;

        }

        #keyboardToggle.active {
            border: 1.5px solid #3B82F6;
            background: #bedaff;
        }

        .pressureBtn img,
        .strokeWidthBtn img,
        .fillTypeBtn img,
        .edgeStyleBtn img {
            width: 24px;
            height: 24px
        }

        .title {
            font-size: 13px;
            color: #000000;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .styleGroup {
            width: 90%;
            display: flex;
            flex-direction: row;
            gap: 5px;
            align-items: center;
            margin-bottom: 14px;
        }

        .styleGroup input[type="color"] {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: white;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 10px;
            border: 0.5px solid black
        }

        .strokeColorBtn,
        .fillColorBtn {
            width: 28px;
            height: 28px;
            padding: 1.5px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .strokeColorBtn:hover,
        .fillColorBtn:hover {
            cursor: pointer;
            transform: scale(1.08);
        }

        .strokeColorBtn.active,
        .fillColorBtn.active {
            border: 0.5px solid #2563EB;
        }

        .divider {
            width: 1.5px;
            height: 29px;
            background: #bedaff;
        }

        .strokeColorBtn div,
        .fillColorBtn div {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        #canvas,
        #overlayCanvas,
        #cacheCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #overlayCanvas,
        #cacheCanvas {
            pointer-events: none;
        }

        .strokeBtn img {
            width: 32px;
            height: 32px
        }

        #leftPanel {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            min-height: 0;
        }

        #bottomPanel {
            width: 100%;
            height: 100px;
            background: rgb(255, 255, 255);
            border-radius: 12px;
            margin-top: auto;
            flex-shrink: 0;
        }

        #zoomDisplay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #FFFFFF;
            border: 1px solid #D9E6F2;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            z-index: 10;
            user-select: none;
        }


        #zoomDisplay button {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
        }

        #zoomDisplay button img {
            width: 100%;
            height: 100%
        }

        #toolBarLeft::-webkit-scrollbar {
            width: 5px;
        }

        #toolBarLeft::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 999px;
        }

        #toolBarLeft::-webkit-scrollbar-thumb {
            background: #C9D4E3;
            border-radius: 999px;
        }

        #toolBarLeft::-webkit-scrollbar-thumb:hover {
            background: #A9B8CC;
        }

        .transparentColor {
            background-color: white;
            background-image: conic-gradient(#ddd 25%,
                    #fff 0 50%,
                    #ddd 0 75%,
                    #fff 0);
            background-size: 12px 12px;
        }

        .fillPickerWrapper,
        .strokePickerWrapper {
            width: 35px;
            height: 35px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 0.5px solid black
        }

        #fillPickerPreview,
        #strokePickerPreview {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            pointer-events: none;
        }


        .fillPickerWrapper input,
        .strokePickerWrapper input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .disabledBtn {
            opacity: 0.4;
            cursor: not-allowed !important;
            filter: grayscale(100%);
        }

        .disabledBtn:hover {
            background: transparent !important;
        }
    </style>
</head>

<body>



    <div id="canvasArea">
        <canvas id="canvas"></canvas>
        <canvas id="cacheCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>


        <div id="toolBarTop">
            <div class="toolGroup">
                <button class="toolBarTopBtn active" data-tool="pointer">
                    <img src="../static/assets/mouse-pointer-2.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="hand">
                    <img src="../static/assets/hand.svg">
                </button>
                <button id="gridToggleBtn">
                    <img src="../static/assets/grid-3x3.svg">
                </button>
            </div>
            <div class="divider"></div>
            <div class="toolGroup">
                <button class="toolBarTopBtn" data-tool="pencil">
                    <img src="../static/assets/pencil.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="line">
                    <img src="../static/assets/minus.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="arrow">
                    <img src="../static/assets/move-right.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="rectangle">
                    <img src="../static/assets/rectangle-horizontal.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="triangle">
                    <img src="../static/assets/triangle.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="diamond">
                    <img src="../static/assets/diamond.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="circle">
                    <img src="../static/assets/circle.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="eraser">
                    <img src="../static/assets/eraser.svg">
                </button>
            </div>
            <div class="divider"></div>
            <div class="toolGroup">
                <button class="toolBarTopBtn" data-tool="text">
                    <img src="../static/assets/type.svg">
                </button>
                <button class="toolBarTopBtn disabledBtn" data-tool="image">
                    <img src="../static/assets/image.svg">
                </button>
            </div>
            <div class="divider"></div>
            <div>
                <button class="toolBarTopBtn" data-tool="undo">
                    <img src="../static/assets/undo.svg">
                </button>
                <button class="toolBarTopBtn" data-tool="redo">
                    <img src="../static/assets/redo.svg">
                </button>
            </div>
            <div class="divider"></div>
            <div class="toolGroup">
                <button class="toolBarTopBtn disabledBtn" data-tool="download">
                    <img src="../static/assets/arrow-down-to-line.svg">
                </button>
                <button class="toolBarTopBtn disabledBtn" data-tool="settings">
                    <img src="../static/assets/settings.svg">
                </button>
            </div>
        </div>


        <div id="toolBarLeft">

            <div id="strokeColorSection">
                <div class="title">Stroke</div>
                <div class="styleGroup" id="strokeColorArea">

                    <div class="strokePickerWrapper">
                        <div id="strokePickerPreview" style="background: black;"></div>
                        <input type="color" id="strokeColorPicker" value="#000000">
                    </div>


                    <div class="divider"></div>
                    <button class="strokeColorBtn" data-color="#2563EB">
                        <div style="background:#2563EB;"></div>
                    </button>
                    <button class="strokeColorBtn" data-color="#DC2626">
                        <div style="background:#DC2626;"></div>
                    </button>
                    <button class="strokeColorBtn" data-color="#16A34A">
                        <div style="background:#16A34A;"></div>
                    </button>
                    <button class="strokeColorBtn" data-color="#7C3AED">
                        <div style="background:#7C3AED;"></div>
                    </button>
                    <button class="strokeColorBtn" data-color="#000000">
                        <div style="background:#000000;"></div>
                    </button>
                </div>
            </div>

            <div id="fillSection">
                <div class="title">Fill</div>
                <div class="styleGroup" if="fillColorArea">


                    <div class="fillPickerWrapper">
                        <div id="fillPickerPreview" style="background: #ffffff;"></div>
                        <input type="color" id="fillColorPicker" value="#ffffff">
                    </div>


                    <div class="divider"></div>
                    <button class="fillColorBtn" data-color="#FF6B6B">
                        <div style="background:#FF6B6B;"></div>
                    </button>
                    <button class="fillColorBtn" data-color="#81C784">
                        <div style="background:#81C784;"></div>
                    </button>
                    <button class="fillColorBtn" data-color="#F48FB1">
                        <div style="background:#F48FB1;"></div>
                    </button>
                    <button class="fillColorBtn" data-color="#FACC15">
                        <div style="background:#FDE68A;"></div>
                    </button>
                    <button class="fillColorBtn" data-color="transparent">
                        <div class="transparentColor"></div>
                    </button>
                </div>
            </div>

            <div id="strokeWidthSection">
                <div class="title">Stroke Width</div>
                <div id="strokeWidthArea">
                    <button class="strokeWidthBtn active" data-strokewidth="2">
                        <img src="../static/assets/strokeWidth3png.svg">
                    </button>
                    <button class="strokeWidthBtn" data-strokewidth="4">
                        <img src="../static/assets/strokeWidth2png.svg">
                    </button>
                    <button class="strokeWidthBtn" data-strokewidth="6">
                        <img src="../static/assets/strokeWidth1png.svg">
                    </button>
                </div>
            </div>


            <div id="sloppinessSection">
                <div class="title">Sloppiness</div>
                <div id="strokeArea">
                    <button class="strokeBtn active" data-stroke="stroke1">
                        <img src="../static/assets/smooth3.png">
                    </button>
                    <button class="strokeBtn" data-stroke="stroke2">
                        <img src="../static/assets/medium.png">
                    </button>
                    <button class="strokeBtn" data-stroke="stroke3">
                        <img src="../static/assets/high.png">
                    </button>
                </div>
            </div>




            <div id="fillTypeSection">
                <div class="title">Fill Type</div>
                <div id="fillTypeArea">
                    <button class="fillTypeBtn active" data-filltype="solid">
                        <img src="../static/assets/fillStyleSolid.png">
                    </button>
                    <button class="fillTypeBtn" data-filltype="hachure">
                        <img src="../static/assets/fillStyleHachure.png">
                    </button>
                </div>
            </div>


            <div id="edgeSection">
                <div class="title">Edge Style</div>
                <div id="edgeStyleArea">
                    <button class="edgeStyleBtn active" data-edgestyle="0">
                        <img src="../static/assets/edgeStyle4.png">
                    </button>
                    <button class="edgeStyleBtn" data-edgestyle="25">
                        <img src="../static/assets/edgeStyle5.png">
                    </button>
                </div>
            </div>

            <div id="pressureSelectionSection">
                <div class="title">Pressure</div>
                <div id="pressureSelectionArea">
                    <button class="pressureBtn active" data-pressure="false">
                        <img src="../static/assets/normalPenType2.svg">
                    </button>
                    <button class="pressureBtn" data-pressure="true">
                        <img src="../static/assets/pressurePenType2.svg">
                    </button>
                </div>
            </div>

            <div id="fontSection">
                <div class="title">Fonts</div>
                <div id="fontStyleArea">
                    <button class="fontStyleBtn active" data-fontstyle="sans-serif">
                        <span style="font-family: sans-serif;">Aa</span>
                    </button>
                    <button class="fontStyleBtn" data-fontstyle="codingFont">
                        <span style="font-family: codingFont;">Aa</span>
                    </button>
                    <button class="fontStyleBtn" data-fontstyle="handWriting2">
                        <span style="font-family: handWriting2;">Aa</span>
                    </button>
                    <button class="fontStyleBtn" data-fontstyle="handWriting">
                        <span style="font-family: handWriting;">Aa</span>
                    </button>
                </div>
            </div>


            <div id="layerToggleSection">
                <div class="title">Layer</div>
                <div id="layerToggleArea">
                    <button class="layerToggleBtn" data-function="top">
                        <img src="../static/assets/arrow-up-to-line.svg">
                    </button>
                    <button class="layerToggleBtn" data-function="up">
                        <img src="../static/assets/arrow-up.svg">
                    </button>
                    <button class="layerToggleBtn" data-function="down">
                        <img src="../static/assets/arrow-down.svg">
                    </button>
                    <button class="layerToggleBtn" data-function="bottom">
                        <img src="../static/assets/arrow-down-to-line.svg">
                    </button>
                </div>
            </div>



        </div>


        <div id="zoomDisplay">
            <button id="zoomOutBtn">
                <img src="../static/assets/minus.svg">
            </button>
            <span id="zoomValue">100%</span>
            <button id="zoomInBtn">
                <img src="../static/assets/plus.svg">
            </button>
        </div>
    </div>


    <script type="module" src="../static/js/main.js"></script>
    <script type="module" src="../static/js/canvas/canvas.js"></script>
    <script type="module" src="../static/js/leftToolBar/updateToolBar.js"></script>
    <script type="module" src="../static/js/canvas/canvas.js"></script>

</body>

</html>

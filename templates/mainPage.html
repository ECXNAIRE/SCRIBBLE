<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIBBLE</title>
    <style>
        * {
            box-sizing: border-box;
        }


        html,
        body {
            height: 100%;
            box-shadow:
                0 2px 8px rgba(15, 23, 42, .04);
        }

        body {
            margin: 0;
            background: #F5F9FC;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #toolBarTop {
            width: 60%;
            height: 45px;
            background: #FFFFFF;
            border: 0.5px solid #D9E6F2;
            margin-top: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
        }

        #mainArea {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px
        }

        #toolBarLeft {
            background: #FFFFFF;
            height: 100%;
            width: 250px;
            border: 0.5px solid #D9E6F2;
            border-radius: 10px;
        }

        #canvasArea {
            flex: 1;
            height: 100%;
            border: 0.5px solid #D9E6F2;
            border-radius: 10px;
            background: white;
        }

        #toolBarTop button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #64748B;
            border-radius: 5px;
        }

        #toolBarTop button:hover {
            background: #EFF6FF;
        }

        #toolBarTop button.active {
            background: #DBEAFE;
        }

    </style>
</head>

<body>
    <div id="toolBarTop">
        <div class="toolGroup">
            <button class="active" data-tool="pointer">
                <img src="../static/assets/mouse-pointer-2.svg">
            </button>
            <button data-tool="hand">
                <img src="../static/assets/hand.svg">
            </button>
        </div>


        <div class="toolGroup">
            <button data-tool="pencil">
                <img src="../static/assets/pencil.svg">
            </button>
            <button data-tool="line">
                <img src="../static/assets/minus.svg">
            </button>
            <button data-tool="arrow">
                <img src="../static/assets/move-right.svg">
            </button>
            <button data-tool="rectangle">
                <img src="../static/assets/rectangle-horizontal.svg">
            </button>
            <button data-tool="triangle">
                <img src="../static/assets/triangle.svg">
            </button>
            <button data-tool="diamond">
                <img src="../static/assets/diamond.svg">
            </button>
            <button data-tool="circle">
                <img src="../static/assets/circle.svg">
            </button>
        </div>

        <div class="toolGroup">
            <button data-tool="text">
                <img src="../static/assets/type.svg">
            </button>
            <button data-tool="image">
                <img src="../static/assets/image.svg">
            </button>
        </div>


        <div>
            <button data-tool="undo">
                <img src="../static/assets/undo.svg">
            </button>
            <button data-tool="redo">
                <img src="../static/assets/redo.svg">
            </button>
        </div>

        <div class="toolGroup">
            <button data-tool="download">
                <img src="../static/assets/arrow-down-to-line.svg">
            </button>
            <button data-tool="settings">
                <img src="../static/assets/settings.svg">
            </button>
        </div>


    </div>
    <div id="mainArea">
        <div id="toolBarLeft">

        </div>
        <div id="canvasArea">
            <canvas id="canvas">

            </canvas>
        </div>
    </div>


    <script src="../static/js/main.js"></script>

</body>

</html>
